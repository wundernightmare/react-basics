# Security response headers. Factored into a snippet because nginx's `add_header`
# is NOT inherited by a `location` that declares its own `add_header` — so every
# block that sets a Cache-Control header must re-`include` this file to keep the
# hardening headers.

# Content-Security-Policy — the main XSS lever for an SPA.
#   • script-src 'self'         : only same-origin scripts (the theme init is an
#                                 external file, so NO 'unsafe-inline' needed).
#   • style-src  'self' + inline: component libs set inline style="" attributes.
#   • connect-src 'self'        : same-origin /api. If you point the app at a
#                                 cross-origin API (VITE_API_URL), add that origin.
#   • frame-ancestors 'none'    : clickjacking protection (CSP-native, supersedes
#                                 X-Frame-Options on modern browsers).
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Disable browser features the app doesn't use (defence-in-depth against a
# compromised dependency reaching for them).
add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), usb=()" always;

# Cross-origin isolation hardening.
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# HSTS — enable ONLY when the edge always terminates TLS for this host, since it
# pins the browser to HTTPS for `max-age`. Left off because the container itself
# speaks plain HTTP behind a TLS-terminating proxy; turn it on at the edge or
# uncomment here if this image is the TLS endpoint.
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
