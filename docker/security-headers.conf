# Security response headers. Factored into a snippet because nginx's `add_header`
# is NOT inherited by a `location` that declares its own `add_header` — so every
# block that sets a Cache-Control header must re-`include` this file to keep the
# hardening headers.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
