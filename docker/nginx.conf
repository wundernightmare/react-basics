# Serves the Vite SPA bundle. Mounted at /etc/nginx/conf.d/default.conf, so it
# slots into the base image's http{} block (which already sets sane defaults
# and `include /etc/nginx/conf.d/*.conf`).

server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Server-level default; locations that set their own add_header must
    # re-include this (see docker/security-headers.conf for why).
    include /etc/nginx/snippets/security-headers.conf;

    gzip               on;
    gzip_vary          on;
    gzip_comp_level    6;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_types         text/plain text/css application/javascript application/json
                       image/svg+xml application/wasm font/woff font/woff2;

    # Liveness/readiness probe — cheap, unlogged.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Content-addressed assets (Vite emits hashed filenames) — cache forever.
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # The entry point and the build manifest must always revalidate.
    location = /index.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache";
    }
    location = /build-manifest.json {
        include /etc/nginx/snippets/security-headers.conf;
        default_type application/json;
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: unknown paths render the client-side router's entry point.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
